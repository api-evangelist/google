naftiko: 1.0.0-alpha2
info:
  label: Google Sheets API — Developer
  description: 'Google Sheets API — Developer. 2 operations. Lead operation: Google Get Developer Metadata. Self-contained
    Naftiko capability covering one Google business surface.'
  tags:
  - Google
  - Developer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_API_KEY: GOOGLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: sheets-developer
    baseUri: https://sheets.googleapis.com
    description: Google Sheets API — Developer business capability. Self-contained, no shared references.
    resources:
    - name: v4-spreadsheets-spreadsheetId-developerMetadata-metadataId
      path: /v4/spreadsheets/{spreadsheetId}/developerMetadata/{metadataId}
      operations:
      - name: get
        method: GET
        description: Google Get Developer Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Accept
          in: header
          type: string
        - name: spreadsheetId
          in: path
          type: string
          description: (Required)
          required: true
        - name: metadataId
          in: path
          type: string
          description: (Required)
          required: true
    - name: v4-spreadsheets-spreadsheetId-developerMetadata:search
      path: /v4/spreadsheets/{spreadsheetId}/developerMetadata:search
      operations:
      - name: post
        method: POST
        description: Google Search Developer Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: spreadsheetId
          in: path
          type: string
          description: (Required)
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: sheets-developer-rest
    port: 8080
    description: REST adapter for Google Sheets API — Developer. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v4/spreadsheets/{spreadsheetid}/developermetadata/{metadataid}
      name: v4-spreadsheets-spreadsheetid-developermetadata-metadataid
      description: REST surface for v4-spreadsheets-spreadsheetId-developerMetadata-metadataId.
      operations:
      - method: GET
        name: get
        description: Google Get Developer Metadata
        call: sheets-developer.get
        with:
          Accept: rest.Accept
          spreadsheetId: rest.spreadsheetId
          metadataId: rest.metadataId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v4/spreadsheets/{spreadsheetid}/developermetadata-search
      name: v4-spreadsheets-spreadsheetid-developermetadata-search
      description: REST surface for v4-spreadsheets-spreadsheetId-developerMetadata:search.
      operations:
      - method: POST
        name: post
        description: Google Search Developer Metadata
        call: sheets-developer.post
        with:
          Content-Type: rest.Content-Type
          Accept: rest.Accept
          spreadsheetId: rest.spreadsheetId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sheets-developer-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Sheets API — Developer. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: google-get-developer-metadata
      description: Google Get Developer Metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sheets-developer.get
      with:
        Accept: tools.Accept
        spreadsheetId: tools.spreadsheetId
        metadataId: tools.metadataId
      outputParameters:
      - type: object
        mapping: $.
    - name: google-search-developer-metadata
      description: Google Search Developer Metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: sheets-developer.post
      with:
        Content-Type: tools.Content-Type
        Accept: tools.Accept
        spreadsheetId: tools.spreadsheetId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
