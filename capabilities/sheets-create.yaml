naftiko: 1.0.0-alpha2
info:
  label: Google Sheets API — Create
  description: 'Google Sheets API — Create. 1 operations. Lead operation: Google Create Sheet. Self-contained Naftiko capability
    covering one Google business surface.'
  tags:
  - Google
  - Create
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_API_KEY: GOOGLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: sheets-create
    baseUri: https://sheets.googleapis.com
    description: Google Sheets API — Create business capability. Self-contained, no shared references.
    resources:
    - name: v4-spreadsheets
      path: /v4/spreadsheets
      operations:
      - name: post
        method: POST
        description: Google Create Sheet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: sheets-create-rest
    port: 8080
    description: REST adapter for Google Sheets API — Create. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v4/spreadsheets
      name: v4-spreadsheets
      description: REST surface for v4-spreadsheets.
      operations:
      - method: POST
        name: post
        description: Google Create Sheet
        call: sheets-create.post
        with:
          Content-Type: rest.Content-Type
          Accept: rest.Accept
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sheets-create-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Sheets API — Create. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: google-create-sheet
      description: Google Create Sheet
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sheets-create.post
      with:
        Content-Type: tools.Content-Type
        Accept: tools.Accept
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
