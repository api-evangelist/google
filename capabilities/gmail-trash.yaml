    description: Google Gmail API — Trash business capability. Self-contained, no shared references.
    resources:
    - name: gmail-v1-users-userId-messages-id-trash
      path: /gmail/v1/users/{userId}/messages/{id}/trash
      operations:
      - name: post
        method: POST
        description: Google Trash Messsages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Accept
          in: header
          type: string
        - name: userId
          in: path
          type: string
          description: (Required)
          required: true
        - name: id
          in: path
          type: string
          description: (Required)
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: gmail-v1-users-userId-threads-id-trash
      path: /gmail/v1/users/{userId}/threads/{id}/trash
      operations:
      - name: post
        method: POST
        description: Google Trash Threads
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Accept
          in: header
          type: string
        - name: userId
          in: path
          type: string
          description: (Required)
          required: true
        - name: id
          in: path
          type: string
          description: (Required)
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
