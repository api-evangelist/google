naftiko: 1.0.0-alpha2
info:
  label: Google Gemini API — Image Generation
  description: 'Google Gemini API — Image Generation. 1 operations. Lead operation: Google Generate Images. Self-contained
    Naftiko capability covering one Google business surface.'
  tags:
  - Google
  - Image Generation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_API_KEY: GOOGLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: gemini-image-generation
    baseUri: https://generativelanguage.googleapis.com/v1beta
    description: Google Gemini API — Image Generation business capability. Self-contained, no shared references.
    resources:
    - name: models-imageModel}:generateContent
      path: /models/{imageModel}:generateContent
      operations:
      - name: generateimage
        method: POST
        description: Google Generate Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: imageModel
          in: path
          type: string
          description: The image generation model to use
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: x-goog-api-key
      value: '{{env.GOOGLE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: gemini-image-generation-rest
    port: 8080
    description: REST adapter for Google Gemini API — Image Generation. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/models/imagemodel-generatecontent
      name: models-imagemodel-generatecontent
      description: REST surface for models-imageModel}:generateContent.
      operations:
      - method: POST
        name: generateimage
        description: Google Generate Images
        call: gemini-image-generation.generateimage
        with:
          imageModel: rest.imageModel
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gemini-image-generation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Gemini API — Image Generation. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: google-generate-images
      description: Google Generate Images
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gemini-image-generation.generateimage
      with:
        imageModel: tools.imageModel
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
