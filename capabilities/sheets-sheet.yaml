      path: /v4/spreadsheets
      operations:
      - name: post
        method: POST
        description: Google Create Sheet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v4-spreadsheets-spreadsheetId
      path: /v4/spreadsheets/{spreadsheetId}
      operations:
      - name: get
        method: GET
        description: Google Get Sheet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Accept
          in: header
          type: string
        - name: spreadsheetId
          in: path
          type: string
          description: (Required)
          required: true
    - name: v4-spreadsheets-spreadsheetId-sheets-sheetId}:copyTo
      path: /v4/spreadsheets/{spreadsheetId}/sheets/{sheetId}:copyTo
      operations:
      - name: post
        method: POST
        description: Google Copy To Sheet
