        spreadsheetId: tools.spreadsheetId
      outputParameters:
      - type: object
        mapping: $.
    - name: google-copy-sheet
      description: Google Copy To Sheet
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sheets-sheet.post
      with:
        Content-Type: tools.Content-Type
        Accept: tools.Accept
        spreadsheetId: tools.spreadsheetId
        sheetId: tools.sheetId
        body: tools.body
