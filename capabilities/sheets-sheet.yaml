        - name: Content-Type
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: spreadsheetId
          in: path
          type: string
          description: (Required)
          required: true
        - name: sheetId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v4-spreadsheets-spreadsheetId}:getByDataFilter
      path: /v4/spreadsheets/{spreadsheetId}:getByDataFilter
      operations:
      - name: post
        method: POST
        description: Google Get Sheet by Data Filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: spreadsheetId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
