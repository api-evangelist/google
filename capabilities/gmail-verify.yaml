naftiko: 1.0.0-alpha2
info:
  label: Google Gmail API — Verify
  description: 'Google Gmail API — Verify. 1 operations. Lead operation: Google Verify Send As. Self-contained Naftiko capability
    covering one Google business surface.'
  tags:
  - Google
  - Verify
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_API_KEY: GOOGLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: gmail-verify
    baseUri: https://gmail.googleapis.com
    description: Google Gmail API — Verify business capability. Self-contained, no shared references.
    resources:
    - name: gmail-v1-users-userId-settings-sendAs-sendAsEmail-verify
      path: /gmail/v1/users/{userId}/settings/sendAs/{sendAsEmail}/verify
      operations:
      - name: post
        method: POST
        description: Google Verify Send As
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: (Required)
          required: true
        - name: sendAsEmail
          in: path
          type: string
          description: (Required)
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: gmail-verify-rest
    port: 8080
    description: REST adapter for Google Gmail API — Verify. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/gmail/v1/users/{userid}/settings/sendas/{sendasemail}/verify
      name: gmail-v1-users-userid-settings-sendas-sendasemail-verify
      description: REST surface for gmail-v1-users-userId-settings-sendAs-sendAsEmail-verify.
      operations:
      - method: POST
        name: post
        description: Google Verify Send As
        call: gmail-verify.post
        with:
          userId: rest.userId
          sendAsEmail: rest.sendAsEmail
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gmail-verify-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Gmail API — Verify. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: google-verify-send
      description: Google Verify Send As
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gmail-verify.post
      with:
        userId: tools.userId
        sendAsEmail: tools.sendAsEmail
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
