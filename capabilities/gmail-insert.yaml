naftiko: 1.0.0-alpha2
info:
  label: Google Gmail API — Insert
  description: 'Google Gmail API — Insert. 2 operations. Lead operation: Google Insert Messages. Self-contained Naftiko capability
    covering one Google business surface.'
  tags:
  - Google
  - Insert
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_API_KEY: GOOGLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: gmail-insert
    baseUri: https://gmail.googleapis.com
    description: Google Gmail API — Insert business capability. Self-contained, no shared references.
    resources:
    - name: gmail-v1-users-userId-messages
      path: /gmail/v1/users/{userId}/messages
      operations:
      - name: post
        method: POST
        description: Google Insert Messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: userId
          in: path
          type: string
          description: (Required)
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: gmail-v1-users-userId-settings-sendAs-sendAsEmail-smimeInfo
      path: /gmail/v1/users/{userId}/settings/sendAs/{sendAsEmail}/smimeInfo
      operations:
      - name: post
        method: POST
        description: Google Insert SMIME Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: userId
          in: path
          type: string
          description: (Required)
          required: true
        - name: sendAsEmail
          in: path
          type: string
          description: (Required)
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: gmail-insert-rest
    port: 8080
    description: REST adapter for Google Gmail API — Insert. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/gmail/v1/users/{userid}/messages
      name: gmail-v1-users-userid-messages
      description: REST surface for gmail-v1-users-userId-messages.
      operations:
      - method: POST
        name: post
        description: Google Insert Messages
        call: gmail-insert.post
        with:
          Content-Type: rest.Content-Type
          Accept: rest.Accept
          userId: rest.userId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gmail/v1/users/{userid}/settings/sendas/{sendasemail}/smimeinfo
      name: gmail-v1-users-userid-settings-sendas-sendasemail-smimeinfo
      description: REST surface for gmail-v1-users-userId-settings-sendAs-sendAsEmail-smimeInfo.
      operations:
      - method: POST
        name: post
        description: Google Insert SMIME Info
        call: gmail-insert.post
        with:
          Content-Type: rest.Content-Type
          Accept: rest.Accept
          userId: rest.userId
          sendAsEmail: rest.sendAsEmail
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gmail-insert-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Gmail API — Insert. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: google-insert-messages
      description: Google Insert Messages
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gmail-insert.post
      with:
        Content-Type: tools.Content-Type
        Accept: tools.Accept
        userId: tools.userId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: google-insert-smime-info
      description: Google Insert SMIME Info
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gmail-insert.post
      with:
        Content-Type: tools.Content-Type
        Accept: tools.Accept
        userId: tools.userId
        sendAsEmail: tools.sendAsEmail
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
