naftiko: 1.0.0-alpha2
info:
  label: Google Books API
  description: API for retrieving Bookshelf and Volume resources from Google Books
  tags:
  - Google
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: google
    baseUri: https://www.googleapis.com/books/v1
    description: Google Books API HTTP API.
    authentication:
      type: bearer
      token: '{{GOOGLE_TOKEN}}'
    resources:
    - name: volumes
      path: /volumes
      operations:
      - name: listvolumes
        method: GET
        description: Google List Volumes
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Full-text search query string
        - name: download
          in: query
          type: string
          description: Restrict to volumes by download availability
        - name: filter
          in: query
          type: string
          description: Filter search results
        - name: langRestrict
          in: query
          type: string
          description: Restrict results to books with this language code
        - name: libraryRestrict
          in: query
          type: string
          description: Restrict search to this user's library
        - name: maxResults
          in: query
          type: integer
          description: Maximum number of results to return (0 to 40)
        - name: orderBy
          in: query
          type: string
          description: Sort search results
        - name: partner
          in: query
          type: string
          description: Restrict and brand results for partner ID
        - name: printType
          in: query
          type: string
          description: Restrict to books or magazines
        - name: projection
          in: query
          type: string
          description: Restrict information returned to a set of selected fields
        - name: showPreorders
          in: query
          type: boolean
          description: Set to true to show books available for preorder
        - name: source
          in: query
          type: string
          description: String to identify the originator of this request
        - name: startIndex
          in: query
          type: integer
          description: Index of the first result to return (starts at 0)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: volumes-volumeid
      path: /volumes/{volumeId}
      operations:
      - name: getvolume
        method: GET
        description: Google Get Volume
        inputParameters:
        - name: volumeId
          in: path
          type: string
          required: true
          description: ID of volume to retrieve
        - name: partner
          in: query
          type: string
          description: Brand results for partner ID
        - name: projection
          in: query
          type: string
          description: Restrict information returned to a set of selected fields
        - name: source
          in: query
          type: string
          description: String to identify the originator of this request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userid-bookshelves
      path: /users/{userId}/bookshelves
      operations:
      - name: listbookshelves
        method: GET
        description: Google List Bookshelves
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
          description: ID of user for whom to retrieve bookshelves
        - name: source
          in: query
          type: string
          description: String to identify the originator of this request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userid-bookshelves-shelf
      path: /users/{userId}/bookshelves/{shelf}
      operations:
      - name: getbookshelf
        method: GET
        description: Google Get Bookshelf
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
          description: ID of user for whom to retrieve bookshelves
        - name: shelf
          in: path
          type: string
          required: true
          description: ID of bookshelf to retrieve
        - name: source
          in: query
          type: string
          description: String to identify the originator of this request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userid-bookshelves-shelf-volumes
      path: /users/{userId}/bookshelves/{shelf}/volumes
      operations:
      - name: listbookshelfvolumes
        method: GET
        description: Google List Bookshelf Volumes
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
          description: ID of user for whom to retrieve bookshelf volumes
        - name: shelf
          in: path
          type: string
          required: true
          description: ID of bookshelf to retrieve volumes
        - name: maxResults
          in: query
          type: integer
          description: Maximum number of results to return
        - name: showPreorders
          in: query
          type: boolean
          description: Set to true to show pre-ordered books
        - name: source
          in: query
          type: string
          description: String to identify the originator of this request
        - name: startIndex
          in: query
          type: integer
          description: Index of the first element to return (starts at 0)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mylibrary-bookshelves
      path: /mylibrary/bookshelves
      operations:
      - name: listmybookshelves
        method: GET
