naftiko: 1.0.0-alpha2
info:
  label: Google Gmail API — Disables
  description: 'Google Gmail API — Disables. 1 operations. Lead operation: Google Disable CSE Keypairs. Self-contained Naftiko
    capability covering one Google business surface.'
  tags:
  - Google
  - Disables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_API_KEY: GOOGLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: gmail-disables
    baseUri: https://gmail.googleapis.com
    description: Google Gmail API — Disables business capability. Self-contained, no shared references.
    resources:
    - name: gmail-v1-users-userId-settings-cse-keypairs-keyPairId}:disable
      path: /gmail/v1/users/{userId}/settings/cse/keypairs/{keyPairId}:disable
      operations:
      - name: post
        method: POST
        description: Google Disable CSE Keypairs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: Accept
          in: header
          type: string
        - name: userId
          in: path
          type: string
          description: (Required)
          required: true
        - name: keyPairId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: gmail-disables-rest
    port: 8080
    description: REST adapter for Google Gmail API — Disables. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/gmail/v1/users/{userid}/settings/cse/keypairs/keypairid-disable
      name: gmail-v1-users-userid-settings-cse-keypairs-keypairid-disable
      description: REST surface for gmail-v1-users-userId-settings-cse-keypairs-keyPairId}:disable.
      operations:
      - method: POST
        name: post
        description: Google Disable CSE Keypairs
        call: gmail-disables.post
        with:
          Content-Type: rest.Content-Type
          Accept: rest.Accept
          userId: rest.userId
          keyPairId: rest.keyPairId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gmail-disables-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Gmail API — Disables. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: google-disable-cse-keypairs
      description: Google Disable CSE Keypairs
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: gmail-disables.post
      with:
        Content-Type: tools.Content-Type
        Accept: tools.Accept
        userId: tools.userId
        keyPairId: tools.keyPairId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
