# Curated top Google integrations spanning Workspace + Cloud.
# Each entry becomes one Naftiko capability YAML in integrations/.
# Real Google API paths drawn from temp/google/openapi/.

# Productivity / collaboration (Workspace)
- partner: slack
  name: Forward new Gmail messages to a Slack channel
  category: Collaboration
  use_case: When a Gmail label receives a new message, post a digest card to a Slack channel via an incoming webhook so the team sees inbound mail in-context.
  partner_baseUri: https://hooks.slack.com
  partner_api: Slack Incoming Webhooks
  provider_ops:
    - method: GET
      path: /gmail/v1/users/{userId}/messages
      name: listMessages
      description: List Gmail messages for the authorized user.
    - method: GET
      path: /gmail/v1/users/{userId}/messages/{id}
      name: getMessage
      description: Fetch a Gmail message by id.
  partner_ops:
    - method: POST
      path: /services/{T}/{B}/{X}
      name: postMessage

- partner: salesforce
  name: Mirror Google Calendar events as Salesforce activities
  category: CRM
  use_case: For each event on a Google Calendar (sales rep calendar), upsert a matching Salesforce Event/Task linked to the related Contact or Opportunity.
  partner_baseUri: https://yourinstance.my.salesforce.com
  partner_api: Salesforce REST API
  provider_ops:
    - method: GET
      path: /calendars/{calendarId}/events
      name: listEvents
      description: List events on a Google Calendar.
    - method: GET
      path: /calendars/{calendarId}/events/{eventId}
      name: getEvent
      description: Fetch a single Google Calendar event.
  partner_ops:
    - method: POST
      path: /services/data/v60.0/sobjects/Event
      name: createEvent
    - method: PATCH
      path: /services/data/v60.0/sobjects/Event/{id}
      name: updateEvent

- partner: notion
  name: Index new Google Drive files into a Notion database
  category: Knowledge management
  use_case: When a file is added or modified in a watched Google Drive folder, create or update a row in a Notion database with title, owner, link, and last-modified timestamp.
  partner_baseUri: https://api.notion.com
  partner_api: Notion API
  provider_ops:
    - method: GET
      path: /files
      name: listFiles
      description: List files in Google Drive.
    - method: GET
      path: /files/{fileId}
      name: getFile
      description: Fetch a Google Drive file's metadata.
  partner_ops:
    - method: POST
      path: /v1/pages
      name: createPage
    - method: PATCH
      path: /v1/pages/{page_id}
      name: updatePage

- partner: anthropic
  name: Summarize a Google Doc with Claude and write the summary back
  category: AI
  use_case: Fetch a Google Doc's content, send it to Anthropic's Messages API to generate an executive summary, then append the summary as a new section back into the original Doc.
  partner_baseUri: https://api.anthropic.com
  partner_api: Anthropic Messages API
  provider_ops:
    - method: GET
      path: /v1/documents/{documentId}
      name: getDocument
      description: Retrieve a Google Doc's full content.
    - method: POST
      path: /v1/documents/{documentId}:batchUpdate
      name: batchUpdateDocument
      description: Apply a batch of edits to a Google Doc.
  partner_ops:
    - method: POST
      path: /v1/messages
      name: createMessage

- partner: hubspot
  name: Sync a Google Sheet of leads into HubSpot contacts
  category: CRM
  use_case: Read a designated lead-list range from a Google Sheet and upsert each row as a HubSpot Contact, keyed by email, including custom properties for source campaign and score.
  partner_baseUri: https://api.hubapi.com
  partner_api: HubSpot CRM API
  provider_ops:
    - method: GET
      path: /v4/spreadsheets/{spreadsheetId}/values/{range}
      name: getValues
      description: Read a range of values from a Google Sheet.
    - method: GET
      path: /v4/spreadsheets/{spreadsheetId}
      name: getSpreadsheet
      description: Fetch spreadsheet metadata.
  partner_ops:
    - method: POST
      path: /crm/v3/objects/contacts/batch/upsert
      name: upsertContacts

# Sales / finance
- partner: stripe
  name: Generate Stripe invoices from Google Calendar booking events
  category: Billing
  use_case: When a billable consult is booked on a Google Calendar (matching a configured event-type tag), create a Stripe Invoice for the booked client with the consult line item.
  partner_baseUri: https://api.stripe.com
  partner_api: Stripe API
  provider_ops:
    - method: GET
      path: /calendars/{calendarId}/events
      name: listEvents
      description: List Google Calendar events (filter by booking event type).
    - method: GET
      path: /calendars/{calendarId}/events/{eventId}
      name: getEvent
      description: Fetch a single calendar event for billing context.
  partner_ops:
    - method: POST
      path: /v1/invoices
      name: createInvoice
    - method: POST
      path: /v1/invoiceitems
      name: createInvoiceItem

# Engineering / ops
- partner: jira
  name: Convert a labeled Gmail message into a Jira issue
  category: Issue tracking
  use_case: When a Gmail message lands under a configured label (e.g. support@), parse it and create a Jira issue in a target project with the email body as description and sender as reporter.
  partner_baseUri: https://yoursite.atlassian.net
  partner_api: Jira Cloud REST API
  provider_ops:
    - method: GET
      path: /gmail/v1/users/{userId}/messages
      name: listMessages
      description: List Gmail messages (filter by label).
    - method: POST
      path: /gmail/v1/users/{userId}/messages/{id}/modify
      name: modifyMessage
      description: Apply or remove labels on a Gmail message.
  partner_ops:
    - method: POST
      path: /rest/api/3/issue
      name: createIssue

- partner: asana
  name: Turn Google Calendar events into Asana tasks
  category: Project management
  use_case: For each event on a project planning calendar in Google Calendar, create or update a matching Asana task in the corresponding project with due date set to the event's start time.
  partner_baseUri: https://app.asana.com
  partner_api: Asana API
  provider_ops:
    - method: GET
      path: /calendars/{calendarId}/events
      name: listEvents
      description: List Google Calendar events.
    - method: GET
      path: /calendars/{calendarId}/events/{eventId}
      name: getEvent
      description: Fetch a Google Calendar event.
  partner_ops:
    - method: POST
      path: /api/1.0/tasks
      name: createTask
    - method: PUT
      path: /api/1.0/tasks/{task_gid}
      name: updateTask

# Data / records
- partner: airtable
  name: Two-way sync a Google Sheet with an Airtable base
  category: Data sync
  use_case: Keep a Google Sheet and an Airtable table in sync — write Sheet edits into Airtable records (keyed by a shared id column) and vice versa.
  partner_baseUri: https://api.airtable.com
  partner_api: Airtable API
  provider_ops:
    - method: GET
      path: /v4/spreadsheets/{spreadsheetId}/values/{range}
      name: getValues
      description: Read a range from a Google Sheet.
    - method: PUT
      path: /v4/spreadsheets/{spreadsheetId}/values/{range}
      name: updateValues
      description: Write values back into a Google Sheet range.
  partner_ops:
    - method: GET
      path: /v0/{baseId}/{tableIdOrName}
      name: listRecords
    - method: PATCH
      path: /v0/{baseId}/{tableIdOrName}
      name: updateRecords

- partner: linear
  name: File a Linear issue from a comment in a Google Doc
  category: Issue tracking
  use_case: 'When a Google Doc contains a comment formatted as a Linear directive (e.g. "/linear bug: ..."), create a Linear issue in the configured team with the comment text and a link back to the Doc anchor.'
  partner_baseUri: https://api.linear.app
  partner_api: Linear GraphQL API
  provider_ops:
    - method: GET
      path: /v1/documents/{documentId}
      name: getDocument
      description: Retrieve a Google Doc with its embedded comments.
  partner_ops:
    - method: POST
      path: /graphql
      name: createIssue

- partner: figma
  name: Surface new Google Drive design files in Figma as imported references
  category: Design
  use_case: When a new image or PDF asset lands in a watched Google Drive folder, fetch it and post it as a Figma file comment or import it into a working file via the Figma API.
  partner_baseUri: https://api.figma.com
  partner_api: Figma REST API
  provider_ops:
    - method: GET
      path: /files
      name: listFiles
      description: List files in a Google Drive folder.
    - method: GET
      path: /files/{fileId}
      name: getFile
      description: Fetch a Google Drive file's metadata + download link.
  partner_ops:
    - method: GET
      path: /v1/files/{file_key}
      name: getFile
    - method: POST
      path: /v1/files/{file_key}/comments
      name: postComment

# Data warehouse
- partner: snowflake
  name: Stream a Google Sheet into a Snowflake table
  category: Data warehouse
  use_case: On each edit of a configured Google Sheet, push the changed rows into a Snowflake table via Snowpipe so analytical dashboards see operational spreadsheets in near-real-time.
  partner_baseUri: https://account.snowflakecomputing.com
  partner_api: Snowflake Snowpipe REST API
  provider_ops:
    - method: GET
      path: /v4/spreadsheets/{spreadsheetId}/values/{range}
      name: getValues
      description: Read a range from a Google Sheet.
    - method: GET
      path: /v4/spreadsheets/{spreadsheetId}
      name: getSpreadsheet
      description: Fetch spreadsheet metadata for schema mapping.
  partner_ops:
    - method: POST
      path: /v1/data/pipes/{pipe}/insertFiles
      name: insertFiles
